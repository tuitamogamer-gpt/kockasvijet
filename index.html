<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<title>KockaSvijet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="glcanvas"></canvas>

<!-- ============ GLAVNI MENI ============ -->
<div id="screen-main" class="screen">
  <div class="logo-wrap">
    <div class="logo" id="logo-text">KockaSvijet</div>
    <div class="splash" id="splash-text">100% kockasto!</div>
  </div>
  <div class="menu-col">
    <button class="mbtn big" id="btn-play" data-t="menu.play"></button>
    <button class="mbtn big" id="btn-chars" data-t="menu.chars"></button>
    <div class="menu-row">
      <button class="mbtn" id="btn-options" data-t="menu.options"></button>
      <button class="mbtn" id="btn-about" data-t="menu.about"></button>
    </div>
  </div>
  <div class="corner-left" id="version-label">KockaSvijet v1.0</div>
  <div class="corner-right" data-t="menu.disclaimer"></div>
</div>

<!-- ============ LISTA SVJETOVA ============ -->
<div id="screen-worlds" class="screen panel-screen">
  <div class="panel">
    <h2 data-t="worlds.title"></h2>
    <div id="world-list" class="world-list"></div>
    <div class="btn-row">
      <button class="mbtn" id="btn-world-new" data-t="worlds.new"></button>
      <button class="mbtn" id="btn-world-play" data-t="worlds.play" disabled></button>
    </div>
    <div class="btn-row">
      <button class="mbtn" id="btn-world-del" data-t="worlds.delete" disabled></button>
      <button class="mbtn" id="btn-worlds-back" data-t="ui.back"></button>
    </div>
  </div>
</div>

<!-- ============ NOVI SVIJET ============ -->
<div id="screen-newworld" class="screen panel-screen">
  <div class="panel">
    <h2 data-t="new.title"></h2>
    <label class="lab" data-t="new.name"></label>
    <input type="text" id="nw-name" maxlength="28" autocomplete="off">
    <label class="lab" data-t="new.seed"></label>
    <input type="text" id="nw-seed" maxlength="24" autocomplete="off">
    <div class="btn-row">
      <button class="mbtn opt" id="nw-mode"></button>
      <button class="mbtn opt" id="nw-type"></button>
    </div>
    <div class="btn-row">
      <button class="mbtn opt" id="nw-diff"></button>
    </div>
    <div class="btn-row">
      <button class="mbtn" id="nw-create" data-t="new.create"></button>
      <button class="mbtn" id="nw-back" data-t="ui.back"></button>
    </div>
  </div>
</div>

<!-- ============ IZBOR LIKA ============ -->
<div id="screen-chars" class="screen panel-screen">
  <div class="panel wide">
    <h2 data-t="chars.title"></h2>
    <div id="char-grid" class="char-grid"></div>
    <label class="lab" data-t="chars.name"></label>
    <input type="text" id="char-name" maxlength="16" autocomplete="off">
    <div class="btn-row">
      <button class="mbtn" id="chars-back" data-t="ui.done"></button>
    </div>
  </div>
</div>

<!-- ============ OPCIJE ============ -->
<div id="screen-options" class="screen panel-screen">
  <div class="panel wide">
    <h2 data-t="opt.title"></h2>
    <div id="options-body" class="options-body"></div>
    <div class="btn-row">
      <button class="mbtn" id="btn-controls" data-t="opt.controls"></button>
      <button class="mbtn" id="options-back" data-t="ui.done"></button>
    </div>
  </div>
</div>

<!-- ============ KONTROLE ============ -->
<div id="screen-controls" class="screen panel-screen">
  <div class="panel wide">
    <h2 data-t="opt.controls"></h2>
    <div id="controls-list" class="controls-list"></div>
    <div class="btn-row">
      <button class="mbtn" id="controls-back" data-t="ui.back"></button>
    </div>
  </div>
</div>

<!-- ============ O IGRI ============ -->
<div id="screen-about" class="screen panel-screen">
  <div class="panel">
    <h2>KockaSvijet</h2>
    <div id="about-text" class="about-text"></div>
    <div class="btn-row">
      <button class="mbtn" id="about-back" data-t="ui.back"></button>
    </div>
  </div>
</div>

<!-- ============ UČITAVANJE ============ -->
<div id="screen-loading" class="screen solid">
  <div class="load-box">
    <h2 id="loading-title" data-t="load.building"></h2>
    <div class="progress-outer"><div class="progress-inner" id="loading-bar"></div></div>
    <div id="loading-tip" class="loading-tip"></div>
  </div>
</div>

<!-- ============ PAUZA ============ -->
<div id="screen-pause" class="screen overlay">
  <div class="menu-col">
    <h2 data-t="pause.title"></h2>
    <button class="mbtn big" id="pause-resume" data-t="pause.resume"></button>
    <button class="mbtn big" id="pause-options" data-t="menu.options"></button>
    <button class="mbtn big" id="pause-recipes" data-t="pause.recipes"></button>
    <button class="mbtn big" id="pause-quit" data-t="pause.quit"></button>
  </div>
</div>

<!-- ============ SMRT ============ -->
<div id="screen-death" class="screen overlay death">
  <div class="menu-col">
    <h2 class="death-title" data-t="death.title"></h2>
    <button class="mbtn big" id="death-respawn" data-t="death.respawn"></button>
    <button class="mbtn big" id="death-quit" data-t="pause.quit"></button>
  </div>
</div>

<!-- ============ HUD ============ -->
<div id="hud" class="hidden">
  <div id="crosshair">+</div>
  <div id="vignette"></div>
  <div id="overlay-tint"></div>
  <div id="hud-bottom">
    <div id="stats-row">
      <div id="hearts" class="stat-bar"></div>
      <div id="hunger" class="stat-bar"></div>
    </div>
    <div id="bubbles-row"><div id="bubbles" class="stat-bar"></div></div>
    <div id="hotbar"></div>
    <div id="held-name"></div>
  </div>
  <div id="debug-overlay" class="hidden"></div>
</div>

<!-- ============ INVENTAR / SANDUK / PEĆ / STO ============ -->
<div id="inv-root" class="hidden">
  <div id="inv-window">
    <div id="inv-title"></div>
    <div id="inv-extra"></div>
    <div id="inv-label-main" class="inv-label"></div>
    <div id="inv-main" class="slot-grid"></div>
    <div id="inv-hotbar" class="slot-grid"></div>
  </div>
</div>
<div id="cursor-stack" class="hidden"><img id="cursor-img"><span id="cursor-count"></span></div>
<div id="tooltip" class="hidden"></div>

<!-- ============ KNJIGA RECEPATA ============ -->
<div id="recipes-root" class="hidden">
  <div id="recipes-window">
    <h2 data-t="pause.recipes"></h2>
    <div id="recipes-list"></div>
    <div class="btn-row"><button class="mbtn" id="recipes-close" data-t="ui.back"></button></div>
  </div>
</div>

<div id="toast-wrap"></div>

<script src="js/lang.js"></script>
<script src="js/util.js"></script>
<script src="js/blocks.js"></script>
<script src="js/sound.js"></script>
<script src="js/world.js"></script>
<script src="js/light.js"></script>
<script src="js/mesher.js"></script>
<script src="js/gl.js"></script>
<script src="js/physics.js"></script>
<script src="js/particles.js"></script>
<script src="js/entities.js"></script>
<script src="js/craft.js"></script>
<script src="js/save.js"></script>
<script src="js/player.js"></script>
<script src="js/renderer.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
